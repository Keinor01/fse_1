<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulados - Plataforma Enade</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="logo">Prepara Enade</div>
        <nav>
            <div class="hamburger" onclick="toggleMenu()">☰</div>
            <ul>
                <li><a href="index.html">Início</a></li>
                <li><a href="simulados.html">Simulados</a></li>
                <li><a href="ranking.html">Ranking</a></li>
                <li><a href="casos.html">Casos Práticos</a></li>
            </ul>
        </nav>
        <button class="btn-login" onclick="window.location.href='login.html'">Login</button>
    </header>
    
    <section class="container">
        <h2>Escolha seu Simulado</h2>
        <p>Selecione um dos simulados disponíveis e teste seus conhecimentos.</p>
        
        <div class="simulados-lista">
            <div class="simulado">
                <h3>Simulado - Acessibilidade</h3>
                <p>10 questões sobre acessibilidade digital.</p>
                <a href="simu1.html" class="btn">Iniciar</a>
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2025 Plataforma Enade - Todos os direitos reservados</p>
    </footer>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            let links = document.querySelectorAll("nav ul li a");
            let currentPage = window.location.pathname.split("/").pop();
    
            links.forEach(link => {
                if (link.getAttribute("href") === currentPage) {
                    link.classList.add("active");
                }
            });
        });
    </script>    
</body>
</html>
